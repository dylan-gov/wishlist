<!DOCTYPE html>
<html>
<head>
  <h1>Dylan & Courtney’s Wishlist ❤️</h1>
<p class="subtitle">Our wants and needs</p>
<style>
  body {
    margin: 0;
    font-family: "Inter", "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #f4f4f5, #e4e4e7);
    color: #111;
    text-align: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 10px;
  }

  p.subtitle {
    color: #555;
    margin-bottom: 30px;
  }

  input, select {
    padding: 12px;
    margin: 6px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 10px;
    outline: none;
    background: white;
  }

  input {
    width: 220px;
  }

  button {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #111827;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    opacity: 0.9;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
    margin-top: 30px;
  }

  .list {
    width: 360px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    background: white;
  }

  /* Dylan side (clean/darker) */
  .dylan-header {
    background: linear-gradient(135deg, #111827, #1f2937);
    color: white;
    padding: 18px;
    font-weight: 600;
  }

  /* Courtney side (soft but not overly pink) */
  .courtney-header {
    background: linear-gradient(135deg, #d1d5db, #9ca3af);
    color: #111;
    padding: 18px;
    font-weight: 600;
  }

  .list-content {
    padding: 15px;
  }

  .item {
    background: #f9fafb;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .item a {
    color: #111;
    font-weight: 600;
    text-decoration: none;
  }

  .item a:hover {
    text-decoration: underline;
  }

  .delete {
    background: #e5e7eb;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
  }

  .delete:hover {
    background: #d1d5db;
  }
</style>
</head>

<body>

  <h1>Dylan & Courtney's Wishlist ❤️</h1>

  <h2>Add Item</h2>

  <input id="itemName" placeholder="Item name">
  <input id="itemLink" placeholder="Product link">
  <select id="person">
    <option value="Dylan">Dylan</option>
    <option value="Courtney">Courtney</option>
  </select>
  <button onclick="addItem()">Add</button>

<div class="container">

  <div class="list">
    <div class="dylan-header">Dylan's Wishlist</div>
    <div id="dylanList" class="list-content"></div>
  </div>

  <div class="list">
    <div class="courtney-header">Courtney's Wishlist</div>
    <div id="courtneyList" class="list-content"></div>
  </div>

</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://kvlxtqirblxygntrrjiu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_JbMWZdFCpZR06jw1e-eN7Q_Fq94j6ez";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function addItem() {
      const name = document.getElementById("itemName").value.trim();
      const link = document.getElementById("itemLink").value.trim();
      const person = document.getElementById("person").value;

      if (!name || !link) {
        alert("Please enter both an item name and a link.");
        return;
      }

      const { error } = await supabaseClient
        .from("wishlist")
        .insert([{ name, link, person }]);

      if (error) {
        alert("Error adding item: " + error.message);
        return;
      }

      document.getElementById("itemName").value = "";
      document.getElementById("itemLink").value = "";

      loadItems();
    }

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from("wishlist")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        alert("Error loading wishlist: " + error.message);
        return;
      }

      const dylanList = document.getElementById("dylanList");
      const courtneyList = document.getElementById("courtneyList");

      dylanList.innerHTML = "";
      courtneyList.innerHTML = "";

      data.forEach(item => {
        const html = `
          <div class="item">
            <button class="delete" onclick="deleteItem('${item.id}')">X</button>
            <a href="${item.link}" target="_blank">${item.name}</a>
          </div>
        `;

        if (item.person === "Dylan") {
          dylanList.innerHTML += html;
        } else {
          courtneyList.innerHTML += html;
        }
      });
    }

    async function deleteItem(id) {
      const { error } = await supabaseClient
        .from("wishlist")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Error deleting item: " + error.message);
        return;
      }

      loadItems();
    }

    supabaseClient
      .channel("wishlist-changes")
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "wishlist" },
        () => {
          loadItems();
        }
      )
      .subscribe();

    loadItems();
  </script>

</body>
</html>
