<!DOCTYPE html>
<html>
<head>
  <title>Dylan & Courtney Wishlist</title>
<style>
  body {
    margin: 0;
    font-family: "Inter", "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #fff1f5, #f3e8ff);
    color: #2d1b2f;
    text-align: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 25px;
    color: #7c2d5c;
  }

  h2 {
    color: #9d174d;
    margin-top: 20px;
  }

  input, select {
    padding: 13px;
    margin: 6px;
    font-size: 15px;
    border: 1px solid #e9a8c8;
    border-radius: 12px;
    outline: none;
    background: white;
  }

  input {
    width: 260px;
  }

  input:focus, select:focus {
    border-color: #db2777;
    box-shadow: 0 0 0 3px rgba(219, 39, 119, 0.15);
  }

  button {
    padding: 13px 18px;
    margin: 6px;
    border: none;
    border-radius: 12px;
    background: #db2777;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #be185d;
    transform: translateY(-1px);
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-top: 35px;
  }

  .list {
    background: rgba(255, 255, 255, 0.85);
    width: 360px;
    min-height: 260px;
    padding: 24px;
    border-radius: 24px;
    box-shadow: 0 12px 30px rgba(124, 45, 92, 0.15);
    backdrop-filter: blur(8px);
  }

  .item {
    background: #fff7fb;
    padding: 14px;
    margin: 12px 0;
    border-radius: 16px;
    text-align: left;
    border: 1px solid #fbcfe8;
  }

  .item a {
    font-weight: 700;
    color: #831843;
    text-decoration: none;
  }

  .item a:hover {
    text-decoration: underline;
  }

  .delete {
    float: right;
    background: #ffe4e6;
    color: #9f1239;
    padding: 6px 10px;
    border-radius: 10px;
  }

  .delete:hover {
    background: #fecdd3;
  }
</style>
</head>

<body>

  <h1>Dylan & Courtney's Wishlist ❤️</h1>

  <h2>Add Item</h2>

  <input id="itemName" placeholder="Item name">
  <input id="itemLink" placeholder="Product link">
  <select id="person">
    <option value="Dylan">Dylan</option>
    <option value="Courtney">Courtney</option>
  </select>
  <button onclick="addItem()">Add</button>

  <div class="container">
    <div class="list">
      <h2>Dylan's Wishlist</h2>
      <div id="dylanList"></div>
    </div>

    <div class="list">
      <h2>Courtney's Wishlist</h2>
      <div id="courtneyList"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://kvlxtqirblxygntrrjiu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_JbMWZdFCpZR06jw1e-eN7Q_Fq94j6ez";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function addItem() {
      const name = document.getElementById("itemName").value.trim();
      const link = document.getElementById("itemLink").value.trim();
      const person = document.getElementById("person").value;

      if (!name || !link) {
        alert("Please enter both an item name and a link.");
        return;
      }

      const { error } = await supabaseClient
        .from("wishlist")
        .insert([{ name, link, person }]);

      if (error) {
        alert("Error adding item: " + error.message);
        return;
      }

      document.getElementById("itemName").value = "";
      document.getElementById("itemLink").value = "";

      loadItems();
    }

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from("wishlist")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        alert("Error loading wishlist: " + error.message);
        return;
      }

      const dylanList = document.getElementById("dylanList");
      const courtneyList = document.getElementById("courtneyList");

      dylanList.innerHTML = "";
      courtneyList.innerHTML = "";

      data.forEach(item => {
        const html = `
          <div class="item">
            <button class="delete" onclick="deleteItem('${item.id}')">X</button>
            <a href="${item.link}" target="_blank">${item.name}</a>
          </div>
        `;

        if (item.person === "Dylan") {
          dylanList.innerHTML += html;
        } else {
          courtneyList.innerHTML += html;
        }
      });
    }

    async function deleteItem(id) {
      const { error } = await supabaseClient
        .from("wishlist")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Error deleting item: " + error.message);
        return;
      }

      loadItems();
    }

    supabaseClient
      .channel("wishlist-changes")
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "wishlist" },
        () => {
          loadItems();
        }
      )
      .subscribe();

    loadItems();
  </script>

</body>
</html>
