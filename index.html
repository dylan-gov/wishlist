<!DOCTYPE html>
<html>
<head>
<title>Wishlist</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px;
margin:5px;
}

.item{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>Our Wishlist ❤️</h1>

<input id="searchBox" placeholder="Search wishlist item">
<button onclick="search()">Search</button>

<h2>Results</h2>
<div id="results"></div>

<h2>Wishlist</h2>
<div id="wishlist"></div>

<script>

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || []

function saveWishlist(){
localStorage.setItem("wishlist", JSON.stringify(wishlist))
renderWishlist()
}

function renderWishlist(){

let html=""

wishlist.forEach(item=>{
html += `
<div class="item">
${item}
</div>
`
})

document.getElementById("wishlist").innerHTML = html
}

function addItem(name){

wishlist.push(name)

saveWishlist()

}

async function search(){

  let query = document.getElementById("searchBox").value.toLowerCase();

  let suggestions = {
    "nike": [
      "Nike Air Force 1",
      "Nike Tech Fleece Hoodie",
      "Nike Pegasus Running Shoes",
      "Nike Dri-FIT Shorts",
      "Nike Backpack"
    ],
    "shoes": [
      "Nike Air Max",
      "Adidas Ultraboost",
      "New Balance 550",
      "Converse Chuck Taylor",
      "Vans Old Skool"
    ],
    "hoodie": [
      "Essentials Hoodie",
      "Nike Club Hoodie",
      "Champion Reverse Weave Hoodie",
      "Carhartt Hoodie",
      "Stussy Hoodie"
    ]
  };

  let results = suggestions[query] || [
    `${query} gift idea`,
    `${query} accessories`,
    `${query} clothing`,
    `${query} premium version`,
    `${query} budget option`
  ];

  let html = "";

  results.forEach(item=>{
    html += `
      <div class="item">
        ${item}
        <button onclick="addItem(\`${item}\`)">Add</button>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

renderWishlist()

</script>

</body>
</html>
